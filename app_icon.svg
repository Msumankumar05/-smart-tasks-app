<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Define Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)" />

  <!-- Inner Glow Effect -->
  <circle cx="256" cy="256" r="256" fill="url(#innerGlow)" />

  <!-- Light Top Border (3D Effect) -->
  <ellipse cx="256" cy="100" rx="220" ry="80" fill="#FFFFFF" opacity="0.15" />

  <!-- Task List Items Background -->
  <g id="list-items">
    <!-- Item 1 - Active/Completed -->
    <rect x="80" y="140" width="300" height="30" rx="6" fill="#FFFFFF" opacity="0.95" />
    <circle cx="105" cy="155" r="6" fill="#10B981" />
    <line x1="125" y1="150" x2="155" y2="160" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
    <line x1="160" y1="160" x2="180" y2="145" stroke="#10B981" stroke-width="3" stroke-linecap="round" />

    <!-- Item 2 - Pending -->
    <rect x="80" y="200" width="300" height="30" rx="6" fill="#E0E7FF" opacity="0.9" />
    <circle cx="105" cy="215" r="6" fill="#9333EA" opacity="0.5" />
    <rect x="120" y="210" width="250" height="10" rx="3" fill="#A78BFA" />

    <!-- Item 3 - Pending -->
    <rect x="80" y="260" width="300" height="30" rx="6" fill="#E0E7FF" opacity="0.9" />
    <circle cx="105" cy="275" r="6" fill="#9333EA" opacity="0.5" />
    <rect x="120" y="270" width="200" height="10" rx="3" fill="#A78BFA" />
  </g>

  <!-- Large Green Checkmark Circle (Bottom Right) -->
  <circle cx="380" cy="380" r="95" fill="#10B981" />
  
  <!-- Checkmark Shadow -->
  <circle cx="380" cy="380" r="95" fill="#059669" opacity="0.3" />

  <!-- Checkmark Icon -->
  <g id="checkmark" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="345,385 365,405 415,355" />
  </g>

  <!-- Shine/Highlight on Checkmark Circle -->
  <ellipse cx="330" cy="330" rx="40" ry="40" fill="#FFFFFF" opacity="0.2" />

  <!-- Shadow at Bottom -->
  <ellipse cx="256" cy="490" rx="150" ry="20" fill="#000000" opacity="0.1" />
</svg>
